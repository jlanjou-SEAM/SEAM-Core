<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEAM Operational Status</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{
    background:#0b0f14;
    color:#d7e0ea;
    font-family:Arial,Helvetica,sans-serif;
    margin:0;
    padding:20px;
}
.header{
    margin-bottom:20px;
}
.section{
    margin-top:24px;
}
.card{
    background:#141b22;
    border:1px solid #2a3642;
    border-radius:10px;
    padding:12px;
    margin-bottom:12px;
}
.lock{
    font-size:28px;
    font-weight:bold;
}
.small{
    color:#8ea1b5;
    font-size:13px;
}
a{
    color:#7dc4ff;
}
</style>
</head>
<body>

<div class="header">
    <h1>SEAM Operational Status</h1>

    <div id="generated">Loading telemetry...</div>
    <div id="countdown">Refresh In: 10s</div>

    <br>

    <a href="ledger.html">LOG</a>
</div>

<div class="section">
    <h2>FULL DATA RECORDING</h2>
    <div id="full"></div>
</div>

<div class="section">
    <h2>TARGET ACQUISITION</h2>
    <div id="target"></div>
</div>

<div class="section">
    <h2>FOLLOW PROTOCOL</h2>
    <div id="follow"></div>
</div>

<script>

const TELEMETRY_URL =
"https://jlanjou-seam.github.io/SEAM-Core/data/latest.json";

function renderEvent(event){

    return `
    <div class="card">

        <div class="lock">
            ${event.signature || "Unknown"}
        </div>

        <div style="font-size:22px;margin-top:6px;">
            ${event.recursive_lock || 0}%
            ${event.lock_direction || "→"}
            ${event.lock_velocity_per_minute ?? "--"}/min
        </div>

        <div style="margin-top:10px;">
            ${event.location_resolved ||
              event.street_cross ||
              event.lat_long ||
              "Unknown"}
        </div>

        <div class="small" style="margin-top:8px;">
            ${event.course || "Static"} |
            ${event.regime || "unknown"}
        </div>

        <div class="small" style="margin-top:8px;">
            Obs ${event.observation_count || 0}
        </div>

        <div class="small" style="margin-top:8px;">
            ${event.acquisition_utc || ""}
        </div>

    </div>
    `;
}

async function loadSEAMTelemetry(){

    try{

        const response = await fetch(
            TELEMETRY_URL + "?t=" + Date.now(),
            {
                cache:"no-store"
            }
        );

        const data = await response.json();

        document.getElementById("generated").innerText =
            "Field Generated: " +
            (data.generated_utc || "Unknown");

        const events =
            data.active_events ||
            data.events ||
            [];

        const full = [];
        const target = [];
        const follow = [];

        for(const event of events){

            const lock =
                Number(event.recursive_lock || 0);

            if(lock >= 95){
                full.push(renderEvent(event));
            }
            else if(lock >= 75){
                target.push(renderEvent(event));
            }
            else if(lock >= 50){
                follow.push(renderEvent(event));
            }
        }

        document.getElementById("full").innerHTML =
            full.join("") ||
            "<div class='small'>No active records in this phase.</div>";

        document.getElementById("target").innerHTML =
            target.join("") ||
            "<div class='small'>No active records in this phase.</div>";

        document.getElementById("follow").innerHTML =
            follow.join("") ||
            "<div class='small'>No active records in this phase.</div>";

    }catch(err){

        document.getElementById("generated").innerText =
            "Telemetry load failed";
    }
}

let countdown = 10;

setInterval(() => {

    countdown--;

    if(countdown <= 0){

        countdown = 10;

        loadSEAMTelemetry();
    }

    document.getElementById("countdown").innerText =
        "Refresh In: " + countdown + "s";

},1000);

loadSEAMTelemetry();

</script>

</body>
</html>
