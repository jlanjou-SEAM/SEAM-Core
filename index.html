<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEAM Ops</title>

<style>
body{
    margin:0;
    background:#05070b;
    color:#d7e2f0;
    font-family:Arial,Helvetica,sans-serif;
}
header{
    padding:10px 16px;
    border-bottom:1px solid #1b2430;
    background:#0b1017;
}
h1{
    margin:0;
    font-size:18px;
}
#meta{
    margin-top:4px;
    color:#7d8ca3;
    font-size:11px;
}
#grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
    gap:8px;
    padding:10px;
}
.card{
    border:1px solid #1f2937;
    background:#0c1118;
    border-radius:8px;
    padding:10px;
}
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.sig{
    color:#4ea1ff;
    font-size:14px;
    font-weight:bold;
}
.lock{
    font-size:18px;
    font-weight:bold;
}
.loc{
    margin-top:4px;
    font-size:12px;
}
.row{
    margin-top:6px;
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:#9fb0c9;
}
.state{
    margin-top:6px;
    font-size:11px;
    color:#ffb84d;
}
.footer{
    margin-top:6px;
    display:flex;
    justify-content:space-between;
    font-size:10px;
    color:#7d8ca3;
}
.high{color:#ff6161;}
.mid{color:#ffb84d;}
.low{color:#00d084;}
</style>
</head>
<body>

<header>
<h1>SEAM Operational State</h1>
<div id="meta">Loading...</div>
</header>

<div id="grid"></div>

<script>

function lockClass(v){
    if(v>=95)return 'high';
    if(v>=75)return 'mid';
    return 'low';
}

async function load(){

    const r = await fetch('./data/latest.json?ts='+Date.now());

    if(!r.ok){
        throw new Error('latest.json failed');
    }

    return await r.json();
}

function card(event){

    const div = document.createElement('div');

    div.className='card';

    div.innerHTML = `
        <div class="top">
            <div class="sig">${event.signature||'-'}</div>
            <div class="lock ${lockClass(event.recursive_lock||0)}">
                ${(event.recursive_lock||0).toFixed(1)}%
            </div>
        </div>

        <div class="loc">
            ${event.street_cross||event.lat_long||'-'}
        </div>

        <div class="row">
            <div>${event.regime||'-'}</div>
            <div>Obs ${event.observation_count||0}</div>
        </div>

        <div class="row">
            <div>${event.course||'Static'}</div>
            <div>${event.operational_priority||'-'}</div>
        </div>

        <div class="state">
            ${event.lock_state||'-'}
        </div>

        <div class="footer">
            <div>${event.event_id||'-'}</div>
            <div>
                ${(event.persistence_state?.persistence_score||0)*100|0}%
            </div>
        </div>
    `;

    return div;
}

async function init(){

    const payload = await load();

    const events = payload.active_events || [];

    document.getElementById('meta').textContent =
        `${events.length} active recursive manifolds`;

    const grid = document.getElementById('grid');

    grid.innerHTML='';

    for(const event of events){
        grid.appendChild(card(event));
    }
}

init();
setInterval(init,5000);

</script>

</body>
</html>
