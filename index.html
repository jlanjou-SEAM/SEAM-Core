<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SEAM Semantic Dashboard</title>

<style>
body{
    background:#0b0f14;
    color:#dce6f2;
    font-family:Arial;
    padding:20px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}
.card{
    background:#141b22;
    border:1px solid #243140;
    border-radius:12px;
    padding:14px;
}
.semantic{
    margin-top:12px;
    background:#10161d;
    padding:10px;
    border-radius:8px;
}
.small{
    color:#8ea1b5;
    font-size:13px;
}
</style>
</head>

<body>

<h1>SEAM Operational Status</h1>

<div class="grid" id="grid"></div>

<script>

async function loadData(){

    const response = await fetch(
        "https://jlanjou-seam.github.io/SEAM-Core/data/latest.json?t=" + Date.now(),
        { cache: "no-store" }
    );

    const data = await response.json();

    const html = (data.active_events || []).map(event => `

        <div class="card">

            <h2>${event.signature}</h2>

            <div>
                ${event.recursive_lock}%
                ${event.lock_direction}
                ${event.lock_velocity_per_minute}/min
            </div>

            <div class="small">
                ${event.classified_as || "Unclassified"}
            </div>

            <div class="semantic">

                <strong>Semantic Evolution</strong>

                ${(event.classification_history || []).map(h => `
                    <div class="small">
                        ${h.timestamp}
                        →
                        ${h.state}
                        (${h.confidence})
                    </div>
                `).join("")}

            </div>

        </div>

    `).join("");

    document.getElementById("grid").innerHTML = html;
}

loadData();
setInterval(loadData,10000);

</script>

</body>
</html>
