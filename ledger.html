<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SEAM Operational Ledger</title>

<style>

body{
    background:#0b0f14;
    color:#dce6f2;
    font-family:Arial;
    padding:20px;
}

.row{
    border-bottom:1px solid #243140;
    padding:12px 0;
}

.small{
    color:#8ea1b5;
    font-size:13px;
}

</style>
</head>

<body>

<h1>SEAM Operational Ledger</h1>

<div id="ledger"></div>

<script>

async function loadLedger(){

    const response = await fetch(
        "https://jlanjou-seam.github.io/SEAM-Core/reports/seam_recursive_operational_state.json?t=" + Date.now(),
        {
            cache:"no-store"
        }
    );

    const data = await response.json();

    const html = (data.events || []).map(event => `

        <div class="row">

            <div><strong>${event.signature}</strong></div>

            <div>
                ${event.classified_as || "Unclassified"}
            </div>

            ${(event.classification_history || []).map(h => `
                <div class="small">
                    ${h.timestamp}
                    →
                    ${h.state}
                    (${h.confidence})
                </div>
            `).join("")}

        </div>

    `).join("");

    document.getElementById("ledger").innerHTML = html;
}

loadLedger();

setInterval(loadLedger,10000);

</script>

</body>
</html>
