<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEAM Operational Ledger</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<style>

body{
    margin:0;
    padding:20px;
    background:#0b0f14;
    color:#dce6f2;
    font-family:Arial,Helvetica,sans-serif;
}

.row{
    border-bottom:1px solid #243140;
    padding:12px 0;
}

.small{
    color:#8ea1b5;
    font-size:13px;
}

a{
    color:#7dc4ff;
    text-decoration:none;
}

</style>
</head>
<body>

<h1>SEAM Operational Ledger</h1>

<a href="index.html">STATUS</a>

<div id="ledger" style="margin-top:24px;">
Loading ledger...
</div>

<script>

const LEDGER_URL =
"https://jlanjou-seam.github.io/SEAM-Core/reports/seam_recursive_operational_state.json";

async function loadSEAMLedger(){

    try{

        const response = await fetch(
            LEDGER_URL + "?t=" + Date.now(),
            {
                cache:"no-store"
            }
        );

        const data = await response.json();

        const events = data.events || [];

        document.getElementById("ledger").innerHTML =
            events.map(event => `

                <div class="row">

                    <div>
                        <strong>
                            ${event.event_id || "Unknown"}
                        </strong>
                    </div>

                    <div>
                        ${event.signature || "Unknown"}
                    </div>

                    <div>
                        ${event.recursive_lock || 0}%
                        ${event.lock_direction || "→"}
                        ${event.lock_velocity_per_minute ?? "--"}/min
                    </div>

                    <div>
                        ${event.location_resolved ||
                          event.street_cross ||
                          event.lat_long ||
                          "Unknown"}
                    </div>

                    <div class="small">
                        ${event.acquisition_utc || ""}
                    </div>

                </div>

            `).join("");

    }catch(err){

        document.getElementById("ledger").innerHTML =
            "Ledger load failed.";
    }
}

setInterval(loadSEAMLedger,10000);

loadSEAMLedger();

</script>

</body>
</html>
