<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEAM Log</title>

<style>
body{
    margin:0;
    background:#05070b;
    color:#dce7f7;
    font-family:Arial,Helvetica,sans-serif;
}
header{
    padding:10px 16px;
    background:#0b1017;
    border-bottom:1px solid #1f2937;
}
.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}
h1{
    margin:0;
    font-size:18px;
}
.metrics{
    margin-top:6px;
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    font-size:11px;
    color:#9fb0c9;
}
.navbtn{
    background:#122033;
    border:1px solid #23364f;
    color:#dce7f7;
    padding:6px 12px;
    border-radius:6px;
    text-decoration:none;
    font-size:12px;
}
table{
    width:100%;
    border-collapse:collapse;
    font-size:11px;
}
thead{
    position:sticky;
    top:0;
    background:#0b1017;
}
th,td{
    border-bottom:1px solid #1f2937;
    padding:6px 8px;
    text-align:left;
}
tr:hover{
    background:#0f1722;
}
.good{color:#00d084;}
.bad{color:#ff6161;}
.pending{color:#ffb84d;}
</style>
</head>
<body>

<header>

<div class="top">

<div>
<h1>SEAM Operational Ledger</h1>

<div class="metrics">
<div>Total: <span id="m_total">--</span></div>
<div>Verified: <span id="m_verified">--</span></div>
<div>Expired: <span id="m_expired">--</span></div>
<div>Hit Rate: <span id="m_hit">--</span></div>
</div>

</div>

<a class="navbtn" href="./index.html">STATUS</a>

</div>

</header>

<table>

<thead>
<tr>
<th>State</th>
<th>Lock</th>
<th>Signature</th>
<th>Location</th>
<th>Lat/Long</th>
<th>85%</th>
<th>90%</th>
<th>95%</th>
<th>Official</th>
<th>Lead</th>
<th>Status</th>
</tr>
</thead>

<tbody id="rows"></tbody>

</table>

<script>

async function load(url){
    const r = await fetch(url + '?ts=' + Date.now());
    if(!r.ok) throw new Error(url);
    return await r.json();
}

function t(v){
    if(!v)return '-';
    try{
        return new Date(v).toISOString().substring(11,16);
    }catch{
        return '-';
    }
}

function statusClass(v){
    if(v==='VERIFIED') return 'good';
    if(v==='EXPIRED') return 'bad';
    return 'pending';
}

function deriveMetrics(events){

    const total = events.length;

    const verified = events.filter(
        e => e.verification_state?.official_confirmation
    ).length;

    const expired = events.filter(
        e => e.operational_state === 'EXPIRED'
    ).length;

    const hitRate = total > 0
        ? ((verified / total) * 100).toFixed(1) + '%'
        : '0%';

    return {
        total,
        verified,
        expired,
        hitRate
    };
}

async function init(){

    const state =
        await load('./reports/seam_recursive_operational_state.json');

    const events =
        state.events || [];

    const metrics =
        deriveMetrics(events);

    document.getElementById('m_total').textContent =
        metrics.total;

    document.getElementById('m_verified').textContent =
        metrics.verified;

    document.getElementById('m_expired').textContent =
        metrics.expired;

    document.getElementById('m_hit').textContent =
        metrics.hitRate;

    const rows=document.getElementById('rows');

    rows.innerHTML='';

    for(const event of events){

        const verified =
            event.verification_state?.official_confirmation;

        const status =
            verified ? 'VERIFIED' :
            (event.recursive_lock >= 95 ? 'PENDING' : 'TRACKING');

        const tr=document.createElement('tr');

        tr.innerHTML=`
            <td>${event.lock_state || '-'}</td>
            <td>${(event.recursive_lock || 0).toFixed(1)}%</td>
            <td>${event.signature || '-'}</td>
            <td>${event.street_cross || '-'}</td>
            <td>${event.lat_long || '-'}</td>
            <td>${t(event.lock_thresholds?.['85_percent_utc'])}</td>
            <td>${t(event.lock_thresholds?.['90_percent_utc'])}</td>
            <td>${t(event.lock_thresholds?.['95_percent_utc'])}</td>
            <td>${event.verification_state?.official_classification || '-'}</td>
            <td>${event.verification_state?.lead_time_seconds || '-'}</td>
            <td class="${statusClass(status)}">${status}</td>
        `;

        rows.appendChild(tr);
    }
}

init();
setInterval(init,10000);

</script>

</body>
</html>
