<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SEAM Operational Ledger</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{
    background:#0b0f14;
    color:#d7e0ea;
    font-family:Arial,Helvetica,sans-serif;
    margin:0;
    padding:20px;
}
.row{
    border-bottom:1px solid #2a3642;
    padding:10px 0;
}
.small{
    color:#8ea1b5;
    font-size:13px;
}
a{
    color:#7dc4ff;
}
</style>
</head>
<body>

<h1>SEAM Operational Ledger</h1>

<a href="index.html">STATUS</a>

<div id="ledger" style="margin-top:20px;">
Loading ledger...
</div>

<script>

const LEDGER_URL =
"https://raw.githubusercontent.com/jlanjou-SEAM/SEAM-Core/telemetry/reports/seam_recursive_operational_state.json";

async function loadSEAMLedger(){

    try{

        const response = await fetch(
            LEDGER_URL + "?t=" + Date.now(),
            {
                cache:"no-store"
            }
        );

        const data = await response.json();

        const events = data.events || [];

        document.getElementById("ledger").innerHTML =
            events.map(event => `
                <div class="row">
                    <div><strong>${event.event_id || "Unknown"}</strong></div>
                    <div>${event.signature || "Unknown"}</div>
                    <div>${event.recursive_lock || 0}%</div>
                    <div>${event.location_resolved || event.street_cross || event.lat_long || "Unknown"}</div>
                    <div class="small">${event.acquisition_utc || ""}</div>
                </div>
            `).join("");

    }catch(err){

        document.getElementById("ledger").innerHTML =
            "Ledger load failed.";
    }
}

setInterval(loadSEAMLedger,10000);

loadSEAMLedger();

</script>

</body>
</html>
